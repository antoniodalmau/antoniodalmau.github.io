<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Configurator</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/croppie.js"></script>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/croppie.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar fixed-top navbar-light bg-light" aria-label="First navbar example">
        <div class="container">
            <a class="navbar-brand fw-bolder" href="#">
                <img src="img/badge-3d-fill.svg" alt="" height="32">
                <span class="align-middle">CONFIGURATOR</span>
            </a>
            <button class="navbar-toggler link-primary" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarsExample01" aria-controls="navbarsExample01" aria-expanded="false"
                aria-label="Toggle navigation">
                <img src="img/sliders.svg" alt="">
            </button>

            <div class="collapse navbar-collapse" id="navbarsExample01">
                <hr class="featurette-divider">
                <p>Image</p>
                <div class="upload-demo">
                    <input type="file" id="upload" value="Choose a file" accept="image/*" data-role="none" />
                    <div class="upload-msg btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="65%" height="65%" fill="currentColor"
                            class="bi bi-file-earmark-image" viewBox="0 0 16 16">
                            <path d="M6.502 7a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z" />
                            <path
                                d="M14 14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5L14 4.5V14zM4 1a1 1 0 0 0-1 1v10l2.224-2.224a.5.5 0 0 1 .61-.075L8 11l2.157-3.02a.5.5 0 0 1 .76-.063L13 10V4.5h-2A1.5 1.5 0 0 1 9.5 3V1H4z" />
                        </svg>
                        <p class="fs-6"><sub> UPLOAD A IMAGE</sub></p>
                    </div>
                    <div id="upload-demo"></div>
                    <div class="buttons" style="margin:0 auto;display:table;">
                        <button id="btn" class="reset btn link-danger" data-role="none" style="margin-left:5px;"><svg
                                xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                                class="bi bi-x-circle" viewBox="0 0 16 16">
                                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z" />
                                <path
                                    d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z" />
                            </svg> <span class="align-middle">Remove Image</span></button>
                    </div>
                </div>
                <hr class="featurette-divider">
                <p>Size</p>
                <hr class="featurette-divider">

                <form>
                    <input class="form-control" type="text" placeholder="Search" aria-label="Search">
                </form>
            </div>
        </div>
    </nav>



    <model-viewer camera-controls src="models/mug.glb" alt="model" shadow-intensity="1">
    </model-viewer>


    <script>
        $(function () {

            $(".upload-msg").click(function () {
                $("#upload").click();
            })

            ////this works but wont let me set a new readFile input
            $(".reset").click(function () {
                location.reload();
                $('.upload-demo').removeClass('ready');
                $uploadCrop.croppie('bind', {
                    url: ''
                }).then(function () {
                    console.log('reset complete');
                });
            })

            var $uploadCrop;

            function readFile(input) {
                if (input.files && input.files[0]) {
                    if (/^image/.test(input.files[0].type)) { // only image file
                        var reader = new FileReader();

                        reader.onload = function (e) {
                            $('.upload-demo').addClass('ready');
                            $uploadCrop.croppie('bind', {
                                url: e.target.result
                            }).then(function () {
                                console.log('jQuery bind complete');
                            });
                        }
                        reader.readAsDataURL(input.files[0]);
                    } else {
                        alert("You may only select image files");
                    }
                } else {
                    alert("Sorry - you're browser doesn't support the FileReader API");
                }
            }



            $uploadCrop = $('#upload-demo').croppie({
                viewport: {
                    width: 251,
                    height: 95,
                    type: 'square'
                },
                boundary: {
                    width: 300,
                    height: 300
                },
                mouseWheelZoom: false,
                customClass: 'testCroppie'
            });

            $('#upload').on('change', function () { readFile(this); });
            $('.testCroppie').on('update.croppie', function (ev, cropData) {
                $uploadCrop.croppie('result', {
                    type: 'rawcanvas',
                    //size: { width: 300, height: 300 },
                    size: 'original',
                    format: 'jpg'
                }).then(function (canvas) {
                    const modelViewerTexture = document.querySelector("model-viewer");
                    let material = modelViewerTexture.model.materials[0];
                    material.pbrMetallicRoughness['baseColorTexture'].texture.source.setURI(canvas.toDataURL());
                });
            });

        });
    </script>

    <script type="module">
        const modelViewerTexture = document.querySelector("model-viewer");
        modelViewerTexture.addEventListener("load", (ev) => {
            let material = modelViewerTexture.model.materials[0];
            let applyPBRTexture = (channel, event) => {
                material.pbrMetallicRoughness[channel].texture.source.setURI(event.target.value);
            }
            document.querySelector('#motif').addEventListener('change', function () {
                material.pbrMetallicRoughness['baseColorTexture'].texture.source.setURI(URL.createObjectURL(this.files[0]));
            });
        })
    </script>



</body>

</html>
