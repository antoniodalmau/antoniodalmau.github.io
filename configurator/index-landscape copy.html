<!DOCTYPE html>
<html lang="en" class="h-100">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Configurator</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/croppie.js"></script>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/croppie.css" />
    <link rel="stylesheet" href="css/style-copy.css">
</head>

<body class="d-flex flex-column h-100" onload="updateChoices()">

    <div class="row d-flex align-items-center">
        <div class="col-xl-9 col-lg-8">
            <model-viewer camera-controls src="models/cushion.glb" alt="model" shadow-intensity="1" disable-zoom>
            </model-viewer>
        </div>
        <div class="col-xl-3 col-lg-4">
            <h2 class="title">Configurator</h2>
            <div class="accordion accordion-flush" id="accordionFlushExample">
                <div class="accordion-item">
                    <h2 class="accordion-header" id="flush-headingOne">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse"
                            data-bs-target="#flush-collapseOne" aria-expanded="false" aria-controls="flush-collapseOne">
                            Images </button>
                    </h2>
                    <div id="flush-collapseOne" class="accordion-collapse collapse show"
                        aria-labelledby="flush-headingOne" data-bs-parent="#accordionFlushExample">
                        <div class="accordion-body">
                            <div class="upload-demo">
                                <input type="file" id="upload" value="Choose a file" accept="image/*"
                                    data-role="none" />
                                <div class="upload-msg btn">
                                    <img src="img/file-earmark-image.svg" alt="svg" height="42">
                                    <p class="fs-6"><sub> UPLOAD A IMAGE</sub></p>
                                </div>
                                <div id="upload-demo"></div>
                                <div class="buttons" style="margin:0 auto;display:table;">
                                    <button id="btn" class="reset btn link-danger" data-role="none"
                                        style="margin-left:5px;"><svg xmlns="http://www.w3.org/2000/svg" width="24"
                                            height="24" fill="currentColor" class="bi bi-x-circle" viewBox="0 0 16 16">
                                            <path
                                                d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z" />
                                            <path
                                                d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z" />
                                        </svg> <span class="align-middle">Remove Image</span></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="accordion-item">
                    <h2 class="accordion-header" id="flush-headingTwo">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                            data-bs-target="#flush-collapseTwo" aria-expanded="false" aria-controls="flush-collapseTwo"
                            id="size">
                            Size
                        </button>
                    </h2>
                    <div id="flush-collapseTwo" class="accordion-collapse collapse" aria-labelledby="flush-headingTwo"
                        data-bs-parent="#accordionFlushExample" onchange="updateChoices()">
                        <div class="accordion-body text-start">
                            <input type="radio" class="btn-check" name="size" id="30cm" value="30x30 cm"
                                autocomplete="off" checked>
                            <label class="btn btn-outline-primary btn-sm" for="30cm">30x30 cm</label>
                            <input type="radio" class="btn-check" name="size" id="40cm" value="40x40 cm"
                                autocomplete="off">
                            <label class="btn btn-outline-primary btn-sm" for="40cm">40x40 cm</label>
                            <input type="radio" class="btn-check" name="size" id="60cm" value="60x60 cm"
                                autocomplete="off">
                            <label class="btn btn-outline-primary btn-sm" for="60cm">60x60 cm</label>
                        </div>
                    </div>
                </div>
                <div class="accordion-item">
                    <h2 class="accordion-header" id="flush-headingThree">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                            data-bs-target="#flush-collapseThree" aria-expanded="false"
                            aria-controls="flush-collapseThree" id="back">
                            Back Side
                        </button>
                    </h2>
                    <div id="flush-collapseThree" class="accordion-collapse collapse"
                        aria-labelledby="flush-headingThree" data-bs-parent="#accordionFlushExample" onchange="updateChoices()">
                        <div class="accordion-body text-start">
                            <input type="radio" class="btn-check" name="back" id="white" value="White"
                                autocomplete="off" checked>
                            <label class="btn btn-outline-primary btn-sm" for="white">White</label>
                            <input type="radio" class="btn-check" name="back" id="colour" value="Colour"
                                autocomplete="off">
                            <label class="btn btn-outline-primary btn-sm" for="colour">Color</label>
                        </div>
                    </div>
                </div>
                <div class="accordion-item">
                    <h2 class="accordion-header" id="flush-headingFour">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                            data-bs-target="#flush-collapseFour" aria-expanded="false"
                            aria-controls="flush-collapseFour">
                            Effect
                        </button>
                    </h2>
                    <div id="flush-collapseFour" class="accordion-collapse collapse" aria-labelledby="flush-headingFour"
                        data-bs-parent="#accordionFlushExample">
                        <div class="accordion-body text-start">
                            <input type="radio" class="btn-check" name="effect" id="none" autocomplete="off" checked>
                            <label class="btn btn-outline-primary btn-sm" for="none">None</label>
                            <input type="radio" class="btn-check" name="effect" id="w&b" autocomplete="off">
                            <label class="btn btn-outline-primary btn-sm" for="w&b">White & Black</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script>
        function updateChoices() {
            $("#size").html('Size' + '&nbsp&nbsp<sub style=margin-top:-3px;>' + $("input[name='size']:checked").val() + '</sub>');
            $("#back").html('Back' + '&nbsp&nbsp<sub style=margin-top:-3px;>' + $("input[name='back']:checked").val() + '</sub>');
        }
    </script>


    <script>
        $(function () {

            $(".upload-msg").click(function () {
                $("#upload").click();
            })

            ////this works but wont let me set a new readFile input
            $(".reset").click(function () {
                location.reload();
                $('.upload-demo').removeClass('ready');
                $uploadCrop.croppie('bind', {
                    url: ''
                }).then(function () {
                    console.log('reset complete');
                });
            })

            var $uploadCrop;

            function readFile(input) {
                if (input.files && input.files[0]) {
                    if (/^image/.test(input.files[0].type)) { // only image file
                        var reader = new FileReader();

                        reader.onload = function (e) {
                            $('.upload-demo').addClass('ready');
                            $uploadCrop.croppie('bind', {
                                url: e.target.result
                            }).then(function () {
                                console.log('jQuery bind complete');
                            });
                        }
                        reader.readAsDataURL(input.files[0]);
                    } else {
                        alert("You may only select image files");
                    }
                } else {
                    alert("Sorry - you're browser doesn't support the FileReader API");
                }
            }



            var w = $('flush-collapseOne').width();


            $uploadCrop = $('#upload-demo').croppie({
                viewport: {
                    //width: 251,
                    //height: 95,
                    width: 250,
                    height: 250,
                    type: 'square'
                },
                boundary: {
                    width: w,
                    height: 300
                },
                mouseWheelZoom: true,
                customClass: 'testCroppie'
            });

            $('#upload').on('change', function () { readFile(this); });
            $('.testCroppie').on('update.croppie', function (ev, cropData) {
                $uploadCrop.croppie('result', {
                    type: 'rawcanvas',
                    //size: { width: 300, height: 300 },
                    size: 'original',
                    format: 'jpg'
                }).then(function (canvas) {
                    const modelViewerTexture = document.querySelector("model-viewer");
                    let material = modelViewerTexture.model.materials[0];
                    material.pbrMetallicRoughness['baseColorTexture'].texture.source.setURI(canvas.toDataURL());
                });
            });

        });
    </script>

    <script type="module">
        const modelViewerTexture = document.querySelector("model-viewer");
        modelViewerTexture.addEventListener("load", (ev) => {
            let material = modelViewerTexture.model.materials[0];
            let applyPBRTexture = (channel, event) => {
                material.pbrMetallicRoughness[channel].texture.source.setURI(event.target.value);
            }
            document.querySelector('#motif').addEventListener('change', function () {
                material.pbrMetallicRoughness['baseColorTexture'].texture.source.setURI(URL.createObjectURL(this.files[0]));
            });
        })
    </script>



</body>

</html>
