<!DOCTYPE html>
<html lang="en" class="h-100">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Configurator</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/croppie.js"></script>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/croppie.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex flex-column h-100">


    <main class="flex-shrink-0">
        <model-viewer camera-controls src="models/canvas.glb" alt="model" shadow-intensity="1">
            <h5 class="title">
                <img src="img/badge-3d-fill.svg" alt="svg" height="28" class="filter-title">
                <span class="align-middle">CONFIGURATOR</span>
            </h5>
        </model-viewer>
    </main>

    <!--footer class="footer mt-auto py-3 bg-light"-->
    <footer class="footer bg-lights">
        <div class="container">
            <div class="row">
                <div class="col-3">
                    <div class="upload-demo">
                        <input type="file" id="upload" value="Choose a file" accept="image/*" data-role="none" />
                        <div class="upload-msg btn">
                            <img src="img/file-earmark-image.svg" alt="svg" height="42">
                            <p class="fs-6"><sub> UPLOAD A IMAGE</sub></p>
                        </div>
                        <div id="upload-demo"></div>
                        <div class="buttons" style="margin:0 auto;display:table;">
                            <button id="btn" class="reset btn link-danger" data-role="none"
                                style="margin-left:5px;"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                    fill="currentColor" class="bi bi-x-circle" viewBox="0 0 16 16">
                                    <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z" />
                                    <path
                                        d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z" />
                                </svg> <span class="align-middle">Remove Image</span></button>
                        </div>
                    </div>
                </div>
                <div class="col-3">
                    <!--img src="img/size.svg" alt="" height="36"-->
                    <span class="option">Size</span>
                </div>
                <div class="col-3">
                    <!--img src="img/thickness.svg" alt="" height="36"-->
                    <span class="option">Thickness</span>
                    <input type="radio" class="btn-check" name="thickness" id="2cm" autocomplete="off" checked>
                    <label class="btn btn-outline-primary btn-sm" for="2cm">2 cm</label>
                    <input type="radio" class="btn-check" name="thickness" id="4cm" autocomplete="off">
                    <label class="btn btn-outline-primary btn-sm" for="4cm">4 cm</label>
                </div>
                <div class="col-3">
                    <!--img src="img/edge.svg" alt="" height="36"-->                    
                    <span class="option">Edge Design</span>
                    <input type="radio" class="btn-check" name="edge" id="stretched" autocomplete="off" checked>
                    <label class="btn btn-outline-primary btn-sm" for="stretched">Stretched</label>
                    <input type="radio" class="btn-check" name="edge" id="folded" autocomplete="off">
                    <label class="btn btn-outline-primary btn-sm" for="folded">Folded</label>
                    <input type="radio" class="btn-check" name="edge" id="mirrored" autocomplete="off">
                    <label class="btn btn-outline-primary btn-sm" for="mirrored">Mirrored</label>
                    <input type="radio" class="btn-check" name="edge" id="black" autocomplete="off">
                    <label class="btn btn-outline-primary btn-sm" for="black">Black</label>
                    <input type="radio" class="btn-check" name="edge" id="white" autocomplete="off">
                    <label class="btn btn-outline-primary btn-sm" for="white">White</label>
                </div>
            </div>
        </div>
    </footer>


    <script>
        $(function () {

            $(".upload-msg").click(function () {
                $("#upload").click();
            })

            ////this works but wont let me set a new readFile input
            $(".reset").click(function () {
                location.reload();
                $('.upload-demo').removeClass('ready');
                $uploadCrop.croppie('bind', {
                    url: ''
                }).then(function () {
                    console.log('reset complete');
                });
            })

            var $uploadCrop;

            function readFile(input) {
                if (input.files && input.files[0]) {
                    if (/^image/.test(input.files[0].type)) { // only image file
                        var reader = new FileReader();

                        reader.onload = function (e) {
                            $('.upload-demo').addClass('ready');
                            $uploadCrop.croppie('bind', {
                                url: e.target.result
                            }).then(function () {
                                console.log('jQuery bind complete');
                            });
                        }
                        reader.readAsDataURL(input.files[0]);
                    } else {
                        alert("You may only select image files");
                    }
                } else {
                    alert("Sorry - you're browser doesn't support the FileReader API");
                }
            }





            $uploadCrop = $('#upload-demo').croppie({
                viewport: {
                    width: 251,
                    height: 95,
                    type: 'square'
                },
                boundary: {
                    width: 300,
                    height: 300
                },
                mouseWheelZoom: true,
                customClass: 'testCroppie'
            });

            $('#upload').on('change', function () { readFile(this); });
            $('.testCroppie').on('update.croppie', function (ev, cropData) {
                $uploadCrop.croppie('result', {
                    type: 'rawcanvas',
                    //size: { width: 300, height: 300 },
                    size: 'original',
                    format: 'jpg'
                }).then(function (canvas) {
                    const modelViewerTexture = document.querySelector("model-viewer");
                    let material = modelViewerTexture.model.materials[0];
                    material.pbrMetallicRoughness['baseColorTexture'].texture.source.setURI(canvas.toDataURL());
                });
            });

        });
    </script>

    <script type="module">
        const modelViewerTexture = document.querySelector("model-viewer");
        modelViewerTexture.addEventListener("load", (ev) => {
            let material = modelViewerTexture.model.materials[0];
            let applyPBRTexture = (channel, event) => {
                material.pbrMetallicRoughness[channel].texture.source.setURI(event.target.value);
            }
            document.querySelector('#motif').addEventListener('change', function () {
                material.pbrMetallicRoughness['baseColorTexture'].texture.source.setURI(URL.createObjectURL(this.files[0]));
            });
        })
    </script>



</body>

</html>
