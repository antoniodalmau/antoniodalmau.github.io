<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width">
	<title>WallDecor 3D CSS Effects</title>
	<style>
	@import url('https://fonts.googleapis.com/css?family=Open+Sans:300,300i');
	body {
		color: #666;
		font-family: 'Open Sans';				
	}

	h1, h2{font-weight: 300; text-align: center;}
	p{text-align: center;}
	code{color: #BBB;}

	.scene {
		width: 410px;
		height: 308px;
		/*border: 1px solid #CCC;*/
		perspective: 2000px;
		perspective-origin: 100% 100%;
		display: inline-block;
	}

	.teaser{				
		background: #000 url('https://i.ibb.co/7jKjygz/bg.jpg') center 25% no-repeat;
		background-color: #EEE;
		height: 500px;		
		margin: 0 auto;		
		max-width: 1920px;		
	}

	.container{
		margin: 0 auto;
		padding-left: 50px;
		padding-top: 30px;
		width: 1020px;
	}

	.copy{
		display: inline-block;
		max-width: 510px;
		text-align: left;		
	}	

	.plain {
		width: 410px;
		height: 308px;
		position: relative;
		transform-style: preserve-3d;
		transform: translateZ(-10px);
		transition: transform 1s;
	}
	.plain__face--front{
		background: url('img/motif.jpg');		
		height: 308px;
		line-height: 308px;		
		transform: rotateY(30deg) translateZ( 10px);
		width: 410px;
	}	

	

	.canvas3D{
		width: 410px;
		height: 308px;
		position: relative;
		transform-style: preserve-3d;
		transform: translateZ(-15px);
		transition: transform 1s;		
	}
	.canvas3D__face{				
		color: white;
		font-size: 40px;
		font-weight: bold;
		position: absolute;		
		text-align: center;		
	}
	.canvas3D__face--front{
		background: linear-gradient(90deg, rgba(255,255,255,0.2), rgba(255,255,255,0)), url('img/motif.jpg');				
		border-bottom-right-radius: 4px;		
		border-top-right-radius: 4px;
		box-shadow:
		inset 2px 0px 2px rgba(0,0,0,.25),
		inset -3px 1px 3px rgba(255,255,255,.75);		
		height: 308px;
		line-height: 308px;		
		transform: rotateY(30deg) translateZ(15px);
		width: 410px;		
	}	
	.canvas3D__face--left{
		background: linear-gradient(rgba(0,0,0,.25), rgba(0,0,0,.2)), url('img/motif.jpg');						
		border-bottom-right-radius: 4px;		
		border-top-right-radius: 4px;
		box-shadow:	inset 0px 1px 2px rgba(255,255,255,.75);		
		height: 308px;
		left: 190px;
		line-height: 308px;				
		transform: rotateY(-60deg) translateZ(205px) scaleX(-1);
		width: 30px;		
	}
	.canvas3D__face--back{
		background: url('img/motif.jpg');						
		border-bottom-left-radius: 4px;	
		border-top-left-radius: 4px;
		box-shadow:		
		-5px 5px 7px rgba(0,0,0,.25),
		-10px 10px 25px rgba(0,0,0,0.25),
		-15px 15px 50px rgba(0,0,0,.25);
		height: 308px;
		line-height: 308px;		
		transform: rotateY(30deg) translateZ(-15px);
		width: 410px;
	}



	.acrylic3D{
		width: 410px;
		height: 308px;
		position: relative;
		transform-style: preserve-3d;
		transform: translateZ(-8px);
		transition: transform 1s;		
	}
	.acrylic3D__face{				
		color: white;
		font-size: 40px;
		font-weight: bold;
		position: absolute;
		text-align: center;		
	}
	.acrylic3D__face--front{
		background: 
		linear-gradient(95deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0) 85%, rgba(255,255,255,.5) 88%, rgba(255,255,255,.75) 100%),		
		linear-gradient(95deg, rgba(255,255,255,.5) 0%, rgba(255,255,255,0) 33%),
		url('img/motif.jpg') center center no-repeat,
		linear-gradient(rgba(255,255,255,.25),rgba(255,255,255,.25)),
		url('img/motif.jpg');		
		background-size: 100%, 100%, 99% 98.5%, 100%;
		border-bottom-right-radius: 2px;		
		border-top-right-radius: 2px;		
		height: 308px;
		line-height: 308px;				
		transform: rotateY(30deg) translateZ(8px);
		width: 410px;		
	}	
	.acrylic3D__face--left{
		background: linear-gradient(rgba(0,0,0,.25), rgba(0,0,0,.25));		
		border-bottom-right-radius: 2px;		
		border-top-right-radius: 2px;		
		height: 308px;
		left: 197px;
		line-height: 308px;				
		transform: rotateY(-60deg) translateZ(205px);
		width: 16px;		
	}
	.acrylic3D__face--back{
		background: #fff url('img/motif.jpg');		
		border-bottom-left-radius: 2px;		
		border-top-left-radius: 2px;
		box-shadow:		
		-5px 5px 7px rgba(0,0,0,.25),
		-10px 10px 25px rgba(0,0,0,0.25),
		-15px 15px 50px rgba(0,0,0,.25);		
		height: 308px;
		line-height: 308px;
		transform: rotateY(210deg) translateZ(8px) scaleX(-1);
		width: 410px;

	}



	.alu3D{
		width: 410px;
		height: 308px;
		position: relative;
		transform-style: preserve-3d;
		transform: translateZ(-8px);
		transition: transform 1s;		
	}
	.alu3D__face{				
		color: white;
		font-size: 40px;
		font-weight: bold;
		position: absolute;
		text-align: center;		
	}
	.alu3D__face--front{
		background:
		linear-gradient(95deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0) 85%, rgba(255,255,255,.5) 92%, rgba(255,255,255,.75) 100%),		
		linear-gradient(95deg, rgba(255,255,255,.5) 0%, rgba(255,255,255,0) 33%),		
		url('img/motif.jpg');		
		border-bottom-right-radius: 2px;		
		border-top-right-radius: 2px;		
		height: 308px;
		line-height: 308px;				
		transform: rotateY(30deg) translateZ(8px);
		width: 410px;
	}	
	.alu3D__face--left{
		background: #333;
		border-bottom-right-radius: 2px;		
		border-top-right-radius: 2px;
		box-shadow: 
		inset 2px 1px 0px 1px rgba(255,255,255,.5),
		inset -2px 1px 0px 1px rgba(255,255,255,.5);
		height: 308px;
		left: 197px;
		line-height: 308px;				
		transform: rotateY(-60deg) translateZ(205px);
		width: 16px;		
	}
	.alu3D__face--back{
		background: black;
		border-bottom-left-radius: 2px;		
		border-top-left-radius: 2px;
		box-shadow:		
		-5px 5px 7px rgba(0,0,0,.25),
		-10px 10px 25px rgba(0,0,0,0.25),
		-15px 15px 50px rgba(0,0,0,.25);				
		height: 308px;
		line-height: 308px;
		transform: rotateY(210deg) translateZ(8px) scaleX(-1);
		width: 410px;
	}


	.passepartout3D{
		width: 410px;
		height: 308px;
		position: relative;
		transform-style: preserve-3d;
		transform: translateZ(-20px);
		transition: transform 1s;		
	}
	.passepartout3D__face{				
		color: white;
		font-size: 40px;
		font-weight: bold;
		position: absolute;
		text-align: center;		
	}
	.passepartout3D__face--front{
		background:
		linear-gradient(95deg, rgba(255,255,255,.0) 0%, rgba(255,255,255,0) 75%, rgba(255,255,255,.5) 77%, rgba(255,255,255,.75) 100%),
		linear-gradient(95deg, rgba(255,255,255,.5) 0%, rgba(255,255,255,0) 50%),		
		url('img/motif.jpg') center center no-repeat,
		linear-gradient(135deg, rgba(0,0,0,.2) 0%, rgba(0,0,0,0) 100%) center center no-repeat,
		linear-gradient(rgba(255,255,255,1), rgba(255,255,255,1)) center center no-repeat;
		background-size: 100%, 100%, 77% 70%, 89.5% 86%, 89.5% 86%;
		border-radius: 0px;
		box-shadow:
		inset -1px 0px 1px rgba(255,255,255,.75),
		inset -13px 13px 0px 10px #222,
		inset 13px -13px 0px 10px #222,
		/*inset -35px 35px 0px 10px red,
		inset 35px -35px 0px 10px red,*/
		inset -14px 14px 5px 10px rgba(0,0,0,.9),
		inset 14px -14px 5px 10px rgba(0,0,0,.5),
		inset 0px 0px 0px 22px black;		
		height: 308px;
		line-height: 308px;				
		transform: rotateY(30deg) translateZ(20px);
		width: 410px;
	}	
	.passepartout3D__face--left{
		background: #111;				
		height: 308px;
		left: 185px;
		line-height: 308px;				
		transform: rotateY(-60deg) translateZ(205px);
		width: 40px;		
	}
	.passepartout3D__face--back{
		background: black;		
		border-radius: 0px;
		box-shadow:		
		-5px 5px 7px rgba(0,0,0,.25),
		-10px 10px 25px rgba(0,0,0,0.25),
		-15px 15px 50px rgba(0,0,0,.25);
		height: 308px;
		line-height: 308px;				
		transform: rotateY(30deg) translateZ(-20px);
		width: 410px;
	}	



	.wood3D{
		width: 410px;
		height: 308px;
		position: relative;
		transform-style: preserve-3d;
		transform: translateZ(-10px);
		transition: transform 1s;		
	}
	.wood3D__face{				
		color: white;
		font-size: 40px;
		font-weight: bold;
		position: absolute;		
		text-align: center;		
	}
	.wood3D__face--front{
		background: linear-gradient(90deg, rgba(255,255,255,0.2), rgba(255,255,255,0)), url('wood-texture.jpg'), url('img/motif.jpg');		
		background-blend-mode: multiply;		
		height: 308px;
		line-height: 308px;		
		transform: rotateY(30deg) translateZ(10px);
		width: 410px;
	}	
	.wood3D__face--left{		
		background: linear-gradient(rgba(0,0,0,.25), rgba(0,0,0,.2)), url('https://i.ibb.co/mb5cczH/wood-border.jpg');
		filter: brightness(1.3);
		height: 308px;
		left: 195px;
		line-height: 308px;				
		transform: rotateY(-60deg) translateZ(205px);
		width: 20px;
	}
	.wood3D__face--back{
		background: url('https://i.ibb.co/mb5cczH/wood-border.jpg');			
		box-shadow:		
		-5px 5px 7px rgba(0,0,0,.25),
		-10px 10px 25px rgba(0,0,0,0.25),
		-15px 15px 50px rgba(0,0,0,.25);
		height: 308px;
		line-height: 308px;		
		transform: rotateY(30deg) translateZ(-10px);
		width: 410px;
	}


	.forex3D{
		width: 410px;
		height: 308px;
		position: relative;
		transform-style: preserve-3d;
		transform: translateZ(-8px);
		transition: transform 1s;		
	}
	.forex3D__face{				
		color: white;
		font-size: 40px;
		font-weight: bold;
		position: absolute;		
		text-align: center;		
	}
	.forex3D__face--front{
		background: linear-gradient(90deg, rgba(255,255,255,0.2), rgba(255,255,255,0)), url('img/motif.jpg');						
		height: 308px;
		line-height: 308px;		
		transform: rotateY(30deg) translateZ(8px);
		width: 410px;
	}	
	.forex3D__face--left{		
		background: linear-gradient(0deg, rgba(0,0,0,.25), rgba(0,0,0,.20));
		height: 308px;
		left: 197px;
		line-height: 308px;				
		transform: rotateY(-60deg) translateZ(205px);
		width: 16px;
	}
	.forex3D__face--back{
		background: white;
		box-shadow:		
		-5px 5px 7px rgba(0,0,0,.25),
		-10px 10px 25px rgba(0,0,0,0.25),
		-15px 15px 50px rgba(0,0,0,.25);
		height: 308px;
		line-height: 308px;		
		transform: rotateY(30deg) translateZ(-8px);
		width: 410px;
	}


</style>

</head>
<body>

	<h1>WALLDECOR 3D CSS EFFECTS</h1>
	<p><strong>HINT:</strong> refresh the page to load a new random motif.</p>

	<div class="teaser">
		<div class="container">
			<div class="scene">
				<div class="plain">
					<div class="plain__face plain__face--front"></div>										
				</div>
			</div>
			<div class="copy">
				<h1>PLAIN</h1>
			</div>				
		</div>
	</div>
	<br>
	<div class="teaser">
		<div class="container">
			<div class="scene">
				<div class="canvas3D">
					<div class="canvas3D__face canvas3D__face--front"></div>					
					<div class="canvas3D__face canvas3D__face--left"></div>					
					<div class="canvas3D__face canvas3D__face--back"></div>					
				</div>
			</div>
			<div class="copy">
				<h1>CANVAS</h1>
			</div>				
		</div>
	</div>
	<br>
	<div class="teaser">
		<div class="container">
			<div class="scene">
				<div class="acrylic3D">
					<div class="acrylic3D__face acrylic3D__face--front"></div>
					<div class="acrylic3D__face acrylic3D__face--left"></div>
					<div class="acrylic3D__face acrylic3D__face--back"></div>
				</div>
			</div>
			<div class="copy">
				<h1>ACRYLIC</h1>
			</div>				
		</div>
	</div>
	<br>
	<div class="teaser">
		<div class="container">
			<div class="scene">
				<div class="alu3D">
					<div class="alu3D__face alu3D__face--front"></div>
					<div class="alu3D__face alu3D__face--left"></div>
					<div class="alu3D__face alu3D__face--back"></div>
				</div>
			</div>
			<div class="copy">
				<h1>ALU</h1>
			</div>				
		</div>
	</div>
	<br>
	<div class="teaser">
		<div class="container">
			<div class="scene">
				<div class="passepartout3D">
					<div class="passepartout3D__face passepartout3D__face--front"></div>
					<div class="passepartout3D__face passepartout3D__face--left"></div>					
					<div class="passepartout3D__face passepartout3D__face--back"></div>					
				</div>
			</div>
			<div class="copy">
				<h1>PASSEPARTOUT</h1>
			</div>				
		</div>
	</div>
	<br>
	<div class="teaser">
		<div class="container">
			<div class="scene">
				<div class="wood3D">
					<div class="wood3D__face wood3D__face--front"></div>
					<div class="wood3D__face wood3D__face--left"></div>					
					<div class="wood3D__face wood3D__face--back"></div>					
				</div>
			</div>
			<div class="copy">
				<h1>WOOD</h1>
			</div>				
		</div>
	</div>
	<br>
	<div class="teaser">
		<div class="container">
			<div class="scene">
				<div class="forex3D">
					<div class="forex3D__face forex3D__face--front"></div>
					<div class="forex3D__face forex3D__face--left"></div>					
					<div class="forex3D__face forex3D__face--back"></div>					
				</div>
			</div>
			<div class="copy">
				<h1>FOREX</h1>
			</div>				
		</div>
	</div>	
</body>
</html>
