<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="row">
    <div class="col-md-7">
      <h3 style="font-weight: lighter;"><br>LANDSCAPE</h3>
      <model-viewer src="models/canvas-120x80x4cm-landscape-motif.glb" alt="model" ar
        ar-modes="webxr scene-viewer quick-look" ar-scale="auto" ar-placement="floor" camera-controls loading="lazy"
        environment-image exposure=.6 quick-look-browsers="safari chrome" shadow-intensity=1
        style="width: auto; height: 100vh;">
      </model-viewer>
    </div>
    <div class="col-md-5">
      <h3 style="font-weight: lighter;"><br>PORTRAIT</h3>
      <model-viewer src="models/canvas-120x80x4cm-portrait-motif.glb" alt="model" ar
        ar-modes="webxr scene-viewer quick-look" ar-scale="auto" ar-placement="floor" camera-controls loading="lazy"
        environment-image exposure=.6 quick-look-browsers="safari chrome" shadow-intensity=1
        style="width: auto; height: 100vh;">
      </model-viewer>
    </div>
  </div>


  <script src="js/bootstrap.bundle.min.js"></script>


</body>

</html>
