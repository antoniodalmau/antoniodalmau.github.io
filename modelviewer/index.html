<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>
  <style>
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background-color: #eeeeee;
      /*background-image: radial-gradient(dimgrey, black);*/
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Oxygen-Sans, Ubuntu, Cantarell,
        "Helvetica Neue", sans-serif;
    }
    model-viewer {
    background-color: #eee;
    overflow-x: hidden;
    --poster-color: #eee;
  }
  #ar-button {
background-image: url(ic_view_in_ar_new_googblue_48dp.png);
background-repeat: no-repeat;
background-size: 20px 20px;
background-position: 12px 50%;
background-color: #fff;
position: absolute;
left: 50%;
bottom: 0px;
transform: translateX(-50%);
white-space: nowrap;
bottom: 132px;
padding: 0px 16px 0px 40px;
font-size: 14px;
color: #4285f4;
height: 36px;
line-height: 36px;
border-radius: 18px;
border: 1px solid #DADCE0;
}
  </style>
</head>

<body>
  <model-viewer alt="model name" ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto" autorotate="1" camera-controls
  exposure=".75" ios-src="mug.usdz" loading="lazy" quick-look-browsers="safari chrome" shadow-intensity="1"
  src="mug.glb" style="width: auto; height: 90vh;">
  <button slot="ar-button" id="ar-button">
    View in your space
  </button>    
  </model-viewer>
</body>

</html>
