<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>
  <style>
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(dimgrey, black);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Oxygen-Sans, Ubuntu, Cantarell,
        "Helvetica Neue", sans-serif;
    }
    model-viewer {
    /*background-color: #eee;*/
    overflow-x: hidden;
    --poster-color: #eee;
  }
  </style>
</head>

<body>
    
  <model-viewer alt="model name" ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto" autorotate="1" camera-controls
    exposure=".75" ios-src="mug.usdz" loading="lazy" quick-look-browsers="safari chrome" shadow-intensity="1"
    src="mug.glb" style="width: auto; height: 100vh;">
    <button slot="ar-button" id="ar-button">
      View in your space
    </button>
    <!--button slot="ar-button"
      style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; ">
      <img src="ar-icon.svg" height="22" style="vertical-align:middle">Activate AR
    </button-->
  </model-viewer>
</body>

</html>
