<!DOCTYPE html>

<head>

  <title>Document</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background-image: radial-gradient(dimgrey, black);

        "Helvetica Neue", sans-serif;

<body>


  <!-- Use it like any other HTML element -->
  <model-viewer alt="model name" ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto" autorotate camera-controls
