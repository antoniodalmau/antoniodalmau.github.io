<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>
  <style>
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      color: #666;
      text-align: center;
      background-color: #eeeeee;
      /*background-image: radial-gradient(dimgrey, black);*/
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Oxygen-Sans, Ubuntu, Cantarell,
        "Helvetica Neue", sans-serif;
    }

    select {

      font-size: xx-large;
      background: rgba(0, 0, 0, .05);
      padding: .5em;
      color: #666;
      border: 0;

      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;

      text-align: center;
      text-align-last: center;
      -moz-text-align-last: center;
    }

    select:focus {
      outline: none;
    }


    /* This keeps child nodes hidden while the element loads */
    :not(:defined)>* {
      display: none;
    }

    model-viewer {
      background-color: #eee;
      overflow-x: hidden;
      --poster-color: #eee;
    }

    #ar-button {
      background-image: url(ic_view_in_ar_new_googblue_48dp.png);
      background-repeat: no-repeat;
      background-size: 20px 20px;
      background-position: 12px 50%;
      background-color: #fff;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      bottom: 132px;
      padding: 0px 16px 0px 40px;
      font-family: Roboto Regular, Helvetica Neue, sans-serif;
      font-size: 14px;
      color: #4285f4;
      height: 36px;
      line-height: 36px;
      border-radius: 18px;
      border: 1px solid #DADCE0;
    }

    #ar-button:active {
      background-color: #E8EAED;
    }

    #ar-button:focus {
      outline: none;
    }

    #ar-button:focus-visible {
      outline: 1px solid #4285f4;
    }

    .slider {
      width: 100%;
      text-align: center;
      overflow: hidden;
      position: absolute;
      bottom: 16px;
    }

    .slides {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .slide {
      scroll-snap-align: start;
      flex-shrink: 0;
      width: 100px;
      height: 100px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      background-color: #fff;
      margin-right: 10px;
      border-radius: 10px;
      border: none;
      display: flex;
    }

    .slide.selected {
      border: 2px solid #4285f4;
    }

    .slide:focus {
      outline: none;
    }

    .slide:focus-visible {
      outline: 1px solid #4285f4;
    }
  </style>
</head>

<body>

  <model-viewer alt="model name" ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto" autorotate="1"
    camera-controls exposure=".75" ios-src="mug.usdz" loading="lazy" quick-look-browsers="safari chrome"
    shadow-intensity="1" src="mug.glb" style="width: auto; height: 100vh;">
    <br>
    <span class="footer" style="font-size: small;">Select a product:</span>
    <br>    
    <select id="models">
      <option value="mug">Mug</option>
      <option value="cushion" onchange="document.querySelector('model-viewer').src='cushion.glb'">Cushion</option>
      <option value="book">Book</option>
      <option value="canvas">Canvas</option>
    </select>  
    <button slot="ar-button" id="ar-button">
      View in your space
    </button>

        </button><button class="slide" onclick="switchSrc(this, 'canvas')"
          style="background-image: url('ToyTrain.png');">
      </div>
    </div-->
