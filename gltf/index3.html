<!DOCTYPE html>
<html lang="en">

<head>
	<title>three.js webgl - glTF loader</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<link type="text/css" rel="stylesheet" href="build/main.css">
	<style>
		

		body {
			margin: 0;
			background-image: radial-gradient(dimgrey, black);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
               Roboto, Oxygen-Sans, Ubuntu, Cantarell,
               "Helvetica Neue", sans-serif;
		}

		.footer {
			font-size: x-small;
			color: #666666;
		}

		select {

			font-size: xx-large;
			background: rgba(0, 0, 0, .2);
			padding: .5em;
			color: #ffffff;
			border: 0;
			
			-webkit-appearance: none;
			-moz-appearance: none;
			appearance: none;
		}

		select:focus {
			outline: none;
		}
	</style>
</head>

<body>

	<div
		style="position: absolute; top:5%; left: 0; right: 0; margin-left: auto; margin-right: auto;  text-align: center;">
		<span class="footer" style="font-size: small;">Select a product:</span>
		<br>
		<select id="models">
			<option value="./build/Models/mug.gltf">Mug</option>
			<option value="./build/Models/cushion.gltf">Cushion</option>
		</select>
	</div>
	<div
		style="position: absolute; bottom:0; left: 0; right: 0; margin-left: auto; margin-right: auto;  text-align: center;">
		<span class="footer"><strong>HINT:</strong> Drag to rotate, scroll or pinch to scale.</span>
	</div>



	<script type="module">

		import * as THREE from './build/three.module.js';
		import { OrbitControls } from './build/OrbitControls.js';
		import { GLTFLoader } from './build/GLTFLoader.js';
		import { RGBELoader } from './build/RGBELoader.js';
		import { RoughnessMipmapper } from './build/RoughnessMipmapper.js';

		let camera, scene, renderer, root;

		init();
		render();

		function init() {

			const container = document.createElement('div');
			document.body.appendChild(container);

			camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.25, 20);
			camera.position.set(- 1.8, 0.6, 2.7);
			//camera.position.set(1,1,1);

			scene = new THREE.Scene();


			var light = new THREE.SpotLight(0xffffff, 1);
			light.position.set(-50, 50, 50);
			light.castShadow = true;
			light.shadow.bias = -0.0001;
			light.shadow.mapSize.width = 1024 * 4;
			light.shadow.mapSize.height = 1024 * 4;
			scene.add(light);

			var hemiLight = new THREE.HemisphereLight(0xffffff, 0x666666, .25);
			scene.add(hemiLight);


			var element = document.getElementById("models");

			if (element.value) {
				console.log(element.value);
				const loader = new GLTFLoader();
				loader.load(element.value, function (gltf) {
					if (root) root.parent.remove(root)
					root = gltf.scene;
					scene.add(root);
					render();
				});
			}

			element.onchange = function () {
				console.log(element.value);

				const loader = new GLTFLoader();
				loader.load(element.value, function (gltf) {
					if (root) root.parent.remove(root)
					root = gltf.scene;
					scene.add(root);
					render();
				});
			}

			renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
			renderer.setPixelRatio(window.devicePixelRatio);
			renderer.setSize(window.innerWidth, window.innerHeight);
			renderer.toneMapping = THREE.ACESFilmicToneMapping;
			renderer.toneMappingExposure = 0.75;
			renderer.outputEncoding = THREE.sRGBEncoding;
			container.appendChild(renderer.domElement);

			const pmremGenerator = new THREE.PMREMGenerator(renderer);
			pmremGenerator.compileEquirectangularShader();

			const controls = new OrbitControls(camera, renderer.domElement);
			controls.addEventListener('change', render); // use if there is no animation loop
			controls.minDistance = 2;
			controls.maxDistance = 10;
			controls.target.set(0, 0, - 0.2);
			controls.update();

			window.addEventListener('resize', onWindowResize, false);

		}

		function onWindowResize() {

			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();

			renderer.setSize(window.innerWidth, window.innerHeight);

			render();

		}

		//

		function render() {

			renderer.render(scene, camera);

		}

	</script>

</body>

</html>
