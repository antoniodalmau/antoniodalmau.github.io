<!DOCTYPE html>
<html lang="en">

<head>
	<title>three.js webgl - glTF loader</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<link type="text/css" rel="stylesheet" href="build/main.css">
	<style>
		body {
	  margin: 0;
		background-image: linear-gradient(grey, black);
}
	</style>
</head>

<body>

	<div style="position: absolute; bottom:0; left: 0; right: 0; margin-left: auto; margin-right: auto;  text-align: center;">
		<img src="build/icon-rotate.svg" width=36 alt="">
		<sup><span style="font-size: small;color: #666666;">DRAG TO ROATE</span></sup>
		&nbsp;&nbsp;&nbsp;&nbsp;
		<img src="build/icon-scale.svg" width=32 alt="">
		<sup><span style="font-size: small;color: #666666;">SCROLL OR PINCH TO SCALE</span></sup>
	</div>


	<script type="module">

		import * as THREE from './build/three.module.js';
		import { OrbitControls } from './build/OrbitControls.js';
		import { GLTFLoader } from './build/GLTFLoader.js';
		import { RGBELoader } from './build/RGBELoader.js';
		import { RoughnessMipmapper } from './build/RoughnessMipmapper.js';

		let camera, scene, renderer;

		init();
		render();

		function init() {

			const container = document.createElement('div');
			document.body.appendChild(container);

			camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.25, 20);
			camera.position.set(- 1.8, 0.6, 2.7);

			scene = new THREE.Scene();


			new RGBELoader()
				.setDataType(THREE.UnsignedByteType)
				.setPath('build/equirectangular/')
				.load('pedestrian_overpass_1k.hdr', function (texture) {

					const envMap = pmremGenerator.fromEquirectangular(texture).texture;

					//scene.background = envMap;
					scene.environment = envMap;

					texture.dispose();
					pmremGenerator.dispose();

					render();

					// model

					// use of RoughnessMipmapper is optional
					const roughnessMipmapper = new RoughnessMipmapper(renderer);

					//const loader = new GLTFLoader().setPath('./build/DamagedHelmet/glTF/');
					//loader.load('DamagedHelmet.gltf', function (gltf) {
					const loader = new GLTFLoader().setPath('./build/Mug/');
					loader.load('mug.glb', function (gltf) {

						gltf.scene.traverse(function (child) {

							if (child.isMesh) {

								// TOFIX RoughnessMipmapper seems to be broken with WebGL 2.0
								// roughnessMipmapper.generateMipmaps( child.material );

							}

						});

						scene.add(gltf.scene);

						roughnessMipmapper.dispose();

						render();

					});

				});

			renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
			renderer.setPixelRatio(window.devicePixelRatio);
			renderer.setSize(window.innerWidth, window.innerHeight);
			renderer.toneMapping = THREE.ACESFilmicToneMapping;
			renderer.toneMappingExposure = 1;
			renderer.outputEncoding = THREE.sRGBEncoding;
			container.appendChild(renderer.domElement);

			const pmremGenerator = new THREE.PMREMGenerator(renderer);
			pmremGenerator.compileEquirectangularShader();

			const controls = new OrbitControls(camera, renderer.domElement);
			controls.addEventListener('change', render); // use if there is no animation loop
			controls.minDistance = 2;
			controls.maxDistance = 10;
			controls.target.set(0, 0, - 0.2);
			controls.update();

			window.addEventListener('resize', onWindowResize, false);

		}

		function onWindowResize() {

			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();

			renderer.setSize(window.innerWidth, window.innerHeight);

			render();

		}

		//

		function render() {

			renderer.render(scene, camera);

		}

	</script>

</body>

</html>
