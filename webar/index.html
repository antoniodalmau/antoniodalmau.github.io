<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <model-viewer alt="model" ar ar-modes="scene-viewer webxr quick-look" ar-scale="auto" camera-controls exposure=".7"
    ios-src="model/mug.usdz" loading="lazy" quick-look-browsers="safari chrome" shadow-softness="1" shadow-intensity="1"
    src="models/mug.glb" styles="width: auto; height:90vh;">

    <br>
    <span class="footer" style="font-size: small;">Select a product:</span>
    <br>
    <select id="models" onchange="switchSrc(this.value);">
      <option value="mug">Mug</option>
      <option value="cushion">Cushion</option>
      <option value="ppt">Passepartout</option>
      <option value="canvas">Canvas</option>
    </select>


    <!--button slots="ar-button" id="ar-button">
      View in your Space
    </button-->
    <!-- Button trigger modal -->
    <button type="button" id="ar-button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
      View in your Space
    </button>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLabel">Modal title</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            ...
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn btn-primary">Save changes</button>
          </div>
        </div>
      </div>
    </div>
    <button slot="ar-button" id="ar-button">
      View in your Space
    </button>
  </model-viewer>

  <script>
    function switchSrc(model) {
      document.querySelector("model-viewer").src = 'models/' + model + '.glb';
      document.querySelector("model-viewer").iosSrc = 'models/' + model + '.usdz';
    }
  </script>


  <script src="js/bootstrap.bundle.min.js"></script>


</body>

</html>
